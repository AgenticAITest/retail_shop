name: Deploy to Staging

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: base-multi-tenant

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./base-multi-tenant
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/retail-app:staging
            ${{ secrets.REGISTRY_URL }}/retail-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}

      - name: Deploy to staging server
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          REGISTRY: ${{ secrets.REGISTRY_URL }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            "$STAGING_USER@$STAGING_HOST" \
            "docker pull $REGISTRY/retail-app:staging && \
             docker stop retail-app 2>/dev/null || true && \
             docker rm retail-app 2>/dev/null || true && \
             docker run -d --name retail-app --restart unless-stopped \
               --env-file /opt/retail/.env.staging \
               -p 5000:5000 \
               $REGISTRY/retail-app:staging"
          rm -f /tmp/deploy_key
