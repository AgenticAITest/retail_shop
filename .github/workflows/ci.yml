name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: base-multi-tenant

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: base-multi-tenant/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: base-multi-tenant/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: base-multi-tenant/dist/
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [typecheck, build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retail_user
          POSTGRES_PASSWORD: retail_pass
          POSTGRES_DB: retail_multitenant
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://retail_user:retail_pass@localhost:5432/retail_multitenant
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      ACCESS_TOKEN_SECRET: ci-test-access-secret-minimum-32-chars
      REFRESH_TOKEN_SECRET: ci-test-refresh-secret-minimum-32-chars
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: base-multi-tenant/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: base-multi-tenant/playwright-report/
          retention-days: 7
